name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Web: unit + integration tests ──────────────────────────────────────────
  web-tests:
    name: Web — Unit & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: village
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          ADMIN_EMAIL: admin@test.com
          GEMINI_API_KEY: test-gemini-key

  # ── iOS/Android: unit + integration tests ──────────────────────────────────
  mobile-tests:
    name: Mobile — Unit & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: village-ios
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: village-ios/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test

  # ── Web: E2E tests (Playwright) ─────────────────────────────────────────────
  web-e2e:
    name: Web — E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: web-tests
    defaults:
      run:
        working-directory: village
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Seed test database
        run: bun run seed:test
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Build app
        run: bun run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_EMAIL: admin@test.com
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CALENDAR_SECRET: test-calendar-secret-e2e

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_EMAIL: admin@test.com
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CALENDAR_SECRET: test-calendar-secret-e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: village/playwright-report/
          retention-days: 14
